name: Build & Release

on:
    push:
        tags:
            - "v*" # trigger on version tags like v1.0.0
    workflow_dispatch: # also allow manual runs from the Actions tab

jobs:
    # ──────────────────────────────────────────────
    # 1. Build the Python backend on each platform
    # ──────────────────────────────────────────────
    build-backend:
        strategy:
            matrix:
                include:
                    - os: ubuntu-22.04
                      platform: linux
                    - os: windows-latest
                      platform: win

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Install backend dependencies + PyInstaller
              working-directory: backend
              run: |
                  uv sync
                  uv pip install pyinstaller

            - name: Run PyInstaller
              working-directory: backend
              run: uv run pyinstaller proofreader.spec --distpath ../backend-dist/${{ matrix.platform }}

            - name: Download Playwright Chromium
              working-directory: backend
              run: uv run playwright install chromium
              env:
                  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/backend-dist/${{ matrix.platform }}/browsers

            - name: Upload backend artifact
              uses: actions/upload-artifact@v4
              with:
                  name: backend-${{ matrix.platform }}
                  path: backend-dist/${{ matrix.platform }}/

    # ──────────────────────────────────────────────
    # 2. Build Electron app (Linux runner packages both Linux + Windows)
    # ──────────────────────────────────────────────
    build-electron:
        needs: build-backend
        runs-on: ubuntu-22.04

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Download Linux backend
              uses: actions/download-artifact@v4
              with:
                  name: backend-linux
                  path: backend-dist/linux/

            - name: Download Windows backend
              uses: actions/download-artifact@v4
              with:
                  name: backend-win
                  path: backend-dist/win/

            - name: Make Linux backend executable
              run: chmod +x backend-dist/linux/backend

            - name: Install root dependencies (Electron + electron-builder)
              run: npm install

            - name: Build React frontend
              run: npm run build:frontend

            - name: Build Linux packages (AppImage + deb)
              run: npx electron-builder --linux
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Build Windows installer (cross-compile via Wine)
              run: npx electron-builder --win
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload dist artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: electron-dist
                  path: dist-electron/

    # ──────────────────────────────────────────────
    # 3. Attach everything to the GitHub Release
    # ──────────────────────────────────────────────
    release:
        needs: build-electron
        runs-on: ubuntu-22.04
        if: startsWith(github.ref, 'refs/tags/')

        steps:
            - name: Download electron dist
              uses: actions/download-artifact@v4
              with:
                  name: electron-dist
                  path: dist-electron/

            - name: Create GitHub Release and upload assets
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      dist-electron/*.AppImage
                      dist-electron/*.deb
                      dist-electron/*.exe
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
