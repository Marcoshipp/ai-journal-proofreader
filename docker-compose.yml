services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    container_name: proofreader_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      # Persist uploaded files and config across container restarts
      - ./backend/uploads:/app/uploads
      - ./backend/config.json:/app/config.json
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app_network

  # ── Vite/React frontend served by Nginx ─────────────────────────────────────
  frontend:
    container_name: proofreader_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
    external: true
    name: marco_network
