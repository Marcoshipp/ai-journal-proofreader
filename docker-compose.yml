services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    container_name: proofreader_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Persist uploaded files and config across container restarts
      - ./backend/uploads:/app/uploads
      - ./backend/config.json:/app/config.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - marco_network

  # ── Vite/React frontend served by Nginx ─────────────────────────────────────
  frontend:
    container_name: proofreader_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - marco_network

networks:
  external: true
  name: marco_network
